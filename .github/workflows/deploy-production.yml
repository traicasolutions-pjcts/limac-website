name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type "deploy" to confirm production deployment
        required: true
        default: deploy

concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Vercel Production
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'deploy'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      NEXT_PUBLIC_SITE_URL: https://www.limac.in
      PAYLOAD_URL: https://www.limac.in
      PRODUCT_DATA_SOURCE: csv

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel production environment
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Verify deployment source
        run: |
          git rev-parse --short HEAD
          grep -n "getSiteUrlObject" src/app/layout.tsx
          test -n "$NEXT_PUBLIC_SITE_URL"

      - name: Build production artifact
        run: vercel build --prod --token="$VERCEL_TOKEN"
        env:
          NEXT_PUBLIC_SITE_URL: https://www.limac.in
          PAYLOAD_URL: https://www.limac.in
          PRODUCT_DATA_SOURCE: csv

      - name: Deploy production artifact
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to $DEPLOY_URL"
